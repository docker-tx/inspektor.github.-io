<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Inspector Tool</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root { --bg-dark:#0f172a; --glass:rgba(30,41,59,0.7);} 
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-dark);color:#f8fafc}
.glass{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1)}
.gradient-text{background:linear-gradient(135deg,#6366f1 0%,#a855f7 50%,#ec4899 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.custom-scrollbar::-webkit-scrollbar{width:6px}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}
</style>
</head><body class="min-h-screen flex flex-col p-4 md:p-8"><header class="max-w-7xl mx-auto w-full p-5 glass rounded-2xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-pink-500 rounded-xl flex items-center justify-center">
<i class="fas fa-code text-white"></i>
</div>
<h1 class="text-xl font-bold tracking-tight">Web<span class="gradient-text">Inspector</span></h1>
</div><div class="flex flex-col md:flex-row items-center gap-3"><div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg px-2">
<i class="fas fa-sliders text-slate-500 text-xs mr-2"></i>
<select id="modeSelect" class="bg-transparent text-slate-200 py-2 text-sm outline-none cursor-pointer">
<option value="preview">Preview Mode</option>
<option value="source">Get Source Code</option>
</select>
</div><div class="relative">
<i class="fas fa-link absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
<input type="text" id="urlInput" placeholder="Masukkan URL Website..." class="bg-slate-900 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-sm w-64 outline-none focus:ring-2 focus:ring-indigo-500">
</div></div>
</header><main class="max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-6 flex-grow pb-10"><div class="glass p-6 rounded-2xl flex flex-col gap-4"><div class="flex items-center justify-between">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Preview Website</label>
</div><iframe id="previewFrame" class="flex-grow bg-slate-950 border border-slate-800 rounded-xl w-full min-h-[400px]"></iframe><button onclick="loadWebsite()" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 py-4 rounded-xl font-bold flex items-center justify-center gap-3">
<i class="fas fa-eye"></i>
LOAD WEBSITE
</button></div><div class="glass rounded-2xl flex flex-col overflow-hidden"><div class="bg-slate-900/80 p-4 border-b border-slate-800 flex justify-between items-center"><div class="flex items-center gap-2">
<div class="flex gap-1.5">
<div class="w-3 h-3 rounded-full bg-red-500/50"></div>
<div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
<div class="w-3 h-3 rounded-full bg-green-500/50"></div>
</div>
<span class="text-[10px] font-bold text-slate-500 uppercase ml-3">Inspector Code</span>
</div><button onclick="copyCode()" id="copyBtn" class="flex items-center gap-2 text-xs text-indigo-400 bg-indigo-400/10 px-3 py-1.5 rounded-lg">
<i class="fas fa-copy"></i> Salin
</button></div><pre id="codeOutput" class="p-6 text-xs overflow-auto bg-slate-950 flex-grow text-indigo-300 font-mono whitespace-pre-wrap leading-relaxed custom-scrollbar">Masukkan URL lalu tekan Load...</pre></div></main><script>

function loadWebsite(){

const url=document.getElementById("urlInput").value.trim();
const mode=document.getElementById("modeSelect").value;
const frame=document.getElementById("previewFrame");
const output=document.getElementById("codeOutput");

if(!url){alert("Masukkan URL terlebih dahulu");return}

frame.src=url;

if(mode==="source"){
fetch(url)
.then(res=>res.text())
.then(data=>{
output.textContent=data;
})
.catch(err=>{
output.textContent="Tidak bisa mengambil source (kemungkinan CORS).";
});
}

}

function copyCode(){
const code=document.getElementById("codeOutput").textContent;
navigator.clipboard.writeText(code);

const btn=document.getElementById("copyBtn");
const old=btn.innerHTML;
btn.innerHTML='<i class="fas fa-check"></i> Disalin';

setTimeout(()=>btn.innerHTML=old,2000);
}

</script></body>
</html>
